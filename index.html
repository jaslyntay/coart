<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>coart</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #F5EFE4;
  --surface: #EDE5D6;
  --card: #FAF6EF;
  --border: rgba(90,50,15,0.12);
  --border-strong: rgba(90,50,15,0.22);
  --text: #3B1F08;
  --muted: #7A5C3A;
  --hint: #B09070;
  --orange: #F26400;
  --orange-dim: rgba(242,100,0,0.08);
  --orange-border: rgba(242,100,0,0.35);
}
body {
  background: var(--bg);
  font-family: 'Figtree', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .04em;
  margin-bottom: 16px;
}
.logo-dot {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--orange);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
  margin-bottom: 3px;
}
.tagline {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-style: italic;
  color: var(--text);
  margin-bottom: 8px;
  text-align: center;
  line-height: 1.3;
}
.sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 40px;
  text-align: center;
  line-height: 1.6;
  font-family: 'DM Mono', monospace;
  letter-spacing: .05em;
}
.login-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 320px;
  margin-bottom: 28px;
}
.gbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 18px;
  background: var(--card);
  border: 1px solid var(--border-strong);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  transition: all .15s;
}
.gbtn:hover { border-color: var(--text); background: var(--surface); }
.gbtn-primary {
  background: var(--orange);
  color: var(--bg);
  border-color: var(--orange);
}
.gbtn-primary:hover { opacity: .9; background: var(--orange); border-color: var(--orange); color: var(--bg); }
.g-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}
.role-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--hint);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
  margin-top: 4px;
}
.footer-note {
  margin-top: 32px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--hint);
  letter-spacing: .07em;
  text-align: center;
}
.email-input {
  width: 100%;
  padding: 13px 18px;
  background: var(--card);
  border: 1px solid var(--border-strong);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text);
  outline: none;
}
.email-input:focus { border-color: var(--orange); }
.login-status {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .05em;
  color: var(--muted);
  text-align: center;
  min-height: 14px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="logo">coart<span class="logo-dot"></span></div>
<div class="tagline">Where young ideas meet the people<br/>who believe in them.</div>
<p class="sub">Singapore · 2026 · Prototype</p>

<div class="login-stack">
  <div class="role-label">— Founders & Backers —</div>
  <input class="email-input" id="login-email" type="email" placeholder="you@email.com" autocomplete="email"/>
  <button class="gbtn gbtn-primary" id="login-btn" onclick="sendMagicLink()">Email me a login link →</button>
  <div class="login-status" id="login-status"></div>
  <div class="role-label" style="text-transform:none;letter-spacing:.05em;">One login for both sides — you'll pick founder or backer on your first sign-in.</div>
</div>

<p class="footer-note">Prototype — not a live product · contact@coart.com</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase magic-link login. The URL + anon key are public by design —
// row-level security governs what the anon role can actually touch.
const SUPABASE_URL = 'https://vbnztpgnnkhpoxxkchkd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZibnp0cGdubmtocG94eGtjaGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMTQyNjAsImV4cCI6MjA5ODU5MDI2MH0.iU4YTlsaeI8XncdP0QIWQqPOXwEUJ0XfvTrUyR4crTE';
const sbAuth = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Already signed in? Straight to the dashboard.
sbAuth.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'founder.html';
});

async function sendMagicLink() {
  const email = document.getElementById('login-email').value.trim();
  const status = document.getElementById('login-status');
  const btn = document.getElementById('login-btn');
  if (!email || !email.includes('@')) {
    status.textContent = 'Enter a valid email address.';
    return;
  }
  btn.disabled = true;
  status.textContent = 'Sending…';
  const { error } = await sbAuth.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/founder.html' },
  });
  btn.disabled = false;
  status.textContent = error
    ? 'Could not send link: ' + error.message
    : '✓ Check your email — the link signs you in here.';
}

document.getElementById('login-email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMagicLink();
});
</script>
</body>
</html>
