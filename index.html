<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>coart</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #F5EFE4;
  --surface: #EDE5D6;
  --card: #FAF6EF;
  --border: rgba(90,50,15,0.12);
  --border-strong: rgba(90,50,15,0.22);
  --text: #3B1F08;
  --muted: #7A5C3A;
  --hint: #B09070;
  --orange: #F26400;
  --orange-dim: rgba(242,100,0,0.08);
  --orange-border: rgba(242,100,0,0.35);
}
body {
  background: var(--bg);
  font-family: 'Figtree', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .04em;
  margin-bottom: 16px;
}
.logo-dot {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--orange);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
  margin-bottom: 3px;
}
.tagline {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-style: italic;
  color: var(--text);
  margin-bottom: 8px;
  text-align: center;
  line-height: 1.3;
}
.sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 40px;
  text-align: center;
  line-height: 1.6;
  font-family: 'DM Mono', monospace;
  letter-spacing: .05em;
}
.login-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 320px;
  margin-bottom: 28px;
}
.gbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 18px;
  background: var(--card);
  border: 1px solid var(--border-strong);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  transition: all .15s;
}
.gbtn:hover { border-color: var(--text); background: var(--surface); }
.gbtn-primary {
  background: var(--orange);
  color: var(--bg);
  border-color: var(--orange);
}
.gbtn-primary:hover { opacity: .9; background: var(--orange); border-color: var(--orange); color: var(--bg); }
.g-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}
.role-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--hint);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
  margin-top: 4px;
}
.footer-note {
  margin-top: 32px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--hint);
  letter-spacing: .07em;
  text-align: center;
}
</style>
</head>
<body>

<div class="logo">coart<span class="logo-dot"></span></div>
<div class="tagline">Where young ideas meet the people<br/>who believe in them.</div>
<p class="sub">Singapore · 2026 · Prototype</p>

<div class="login-stack">
  <div class="role-label">— I'm a Founder —</div>
  <a class="gbtn gbtn-primary" href="founder.html">
    <svg class="g-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
    Continue with Google
  </a>
  <div class="role-label">— I'm a Backer —</div>
  <a class="gbtn" href="backer.html">
    <svg class="g-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#3B1F08" d="M44.5 20H24v8.5h11.8C34.7 33.9 30 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
    Continue with Google
  </a>
</div>

<p class="footer-note">Prototype — not a live product · contact@coart.com</p>
</body>
</html>
